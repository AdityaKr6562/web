<!DOCTYPE html>
<html>
<head>
  <title>Draggable Cards</title>
</head>

<body style="margin:0; font-family:Arial; background:#ddd;">

<h2 style="text-align:center;">Draggable Cards</h2>

<div style="text-align:center; margin-bottom:10px;">
  <input type="text" id="text" placeholder="Enter card text">

  <!-- Color selector -->
  <select id="color">
    <option value="purple">Purple</option>
    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="green">Green</option>
    <option value="orange">Orange</option>
  </select>

  <button onclick="addCard()">Add Card</button>
</div>

<script>
let current = null;
let offsetX = 0;
let offsetY = 0;
let z = 1;

// Drag function
function makeDraggable(card) {
  card.addEventListener("mousedown", (e) => {
    current = card;

    z++;
    card.style.zIndex = z;

    offsetX = e.clientX - card.offsetLeft;
    offsetY = e.clientY - card.offsetTop;
  });

  // Change color when clicked
  card.addEventListener("click", () => {
    let selectedColor = document.getElementById("color").value;
    card.style.background = selectedColor;
  });
}

// Move
document.addEventListener("mousemove", (e) => {
  if (!current) return;

  current.style.left = (e.clientX - offsetX) + "px";
  current.style.top = (e.clientY - offsetY) + "px";
});

// Release
document.addEventListener("mouseup", () => {
  current = null;
});

// Add card
function addCard() {
  let text = document.getElementById("text").value;
  let color = document.getElementById("color").value;

  if (text === "") {
    alert("Enter some text");
    return;
  }

  let card = document.createElement("div");
  card.innerText = text;

  // Style
  card.style.width = "120px";
  card.style.height = "120px";
  card.style.position = "absolute";
  card.style.left = "100px";
  card.style.top = "100px";
  card.style.background = color;
  card.style.color = "white";
  card.style.display = "flex";
  card.style.alignItems = "center";
  card.style.justifyContent = "center";
  card.style.borderRadius = "10px";
  card.style.cursor = "grab";
  card.style.fontWeight = "bold";

  // Editable
  card.contentEditable = true;

  document.body.appendChild(card);

  makeDraggable(card);

  document.getElementById("text").value = "";
}
</script>

</body>
</html>
