<!DOCTYPE html>
<html>
<head>
  <title>Vertical ID Card</title>

  <style>
    body {
      background: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      width: 200px;
      height: 350px;
      background: white;
      border-radius: 10px;
      border: 2px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
    }

    .top {
      text-align: center;
      font-size: 12px;
    }

    .vit {
      font-weight: bold;
      font-size: 18px;
    }

    .photo {
      width: 90px;
      height: 110px;
      background: #ccc;
      border: 1px solid black;
      background-image: url('your-photo.jpg'); /* replace */
      background-size: cover;
      background-position: center;
    }

    .bottom {
      text-align: center;
    }

    .name {
      font-weight: bold;
      color: #003366;
    }

    .reg {
      font-size: 14px;
    }

    /* HOSTELLER strip at bottom */
    .hosteller {
      background: #002f6c;
      color: white;
      text-align: center;
      padding: 8px;
      font-weight: bold;
      letter-spacing: 2px;
    }

  </style>

</head>

<body>

<div class="card">

  <!-- Main content -->
  <div class="main">

    <div class="top">
      <div class="vit">VIT</div>
      <div>Vellore Institute of Technology</div>
      <div>Chennai Campus</div>
    </div>

    <div class="photo"></div>

    <div class="bottom">
      <div class="name">Atharva Srivastava</div>
      <div class="reg">24BAI1014</div>
    </div>

  </div>

  <!-- Bottom strip -->
  <div class="hosteller">HOSTELLER</div>

</div>

</body>
</html>
