<!DOCTYPE html>
<html>
<head>
  <title>Interactive Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .card {
      width: 200px;
      height: 250px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      text-align: center;
      padding: 20px;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .card h3 {
      margin-top: 20px;
    }

    /* 🔥 Hover Effects */
    .card:hover {
      transform: translateY(-15px) scale(1.05) rotate(1deg);
      background: #f0f8ff;
    }

    /* Button */
    button {
      margin-top: 20px;
      padding: 8px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4a5fd1;
      transform: scale(1.1);
    }

  </style>

</head>

<body>

<div class="container">

  <div class="card" onclick="changeText(this)">
    <h3>Card 1</h3>
    <p>Hover me!</p>
    <button>Click</button>
  </div>

  <div class="card" onclick="changeText(this)">
    <h3>Card 2</h3>
    <p>Hover me!</p>
    <button>Click</button>
  </div>

  <div class="card" onclick="changeText(this)">
    <h3>Card 3</h3>
    <p>Hover me!</p>
    <button>Click</button>
  </div>

</div>

<script>
function changeText(card) {
  card.querySelector("p").innerText = "Clicked! 🚀";
}
</script>

</body>
</html>
