<!DOCTYPE html>
<html>
<head>
  <title>Image Collage</title>

  <style>
    body {
      margin: 0;
      background: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .collage {
      display: grid;
      grid-template-columns: repeat(4, 150px);
      grid-template-rows: repeat(3, 150px);
      gap: 10px;
    }

    .collage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Different sizes */
    .img1 {
      grid-column: span 2;
      grid-row: span 2;
    }

    .img2 {
      grid-column: span 2;
    }

    .img3 {
      grid-row: span 2;
    }
  </style>

</head>

<body>

<div class="collage">

  <img src="https://picsum.photos/300/300?1" class="img1">
  <img src="https://picsum.photos/300/300?2" class="img2">
  <img src="https://picsum.photos/300/300?3" class="img3">
  <img src="https://picsum.photos/300/300?4">
  <img src="https://picsum.photos/300/300?5">
  <img src="https://picsum.photos/300/300?6">

</div>

</body>
</html>
