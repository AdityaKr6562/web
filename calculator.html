<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f4f4;">

<div style="background:#333; padding:20px; border-radius:15px; width:260px;">

  <!-- Display -->
  <input id="display" type="text" 
    style="width:100%; height:50px; font-size:20px; margin-bottom:10px; text-align:right; padding:5px; border:none; border-radius:5px;" />

  <!-- Buttons -->
  <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;">

    <button onclick="clearDisplay()">C</button>
    <button onclick="append('/')">÷</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('-')">−</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="calculate()" style="grid-row: span 2; background:orange;">=</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>

    <button onclick="append('0')" style="grid-column: span 2;">0</button>
    <button onclick="append('.')">.</button>

  </div>

</div>

<script>
function append(value) {
  document.getElementById("display").value += value;
}

function clearDisplay() {
  document.getElementById("display").value = "";
}

function calculate() {
  let display = document.getElementById("display");

  try {
    display.value = eval(display.value);
  } catch {
    alert("Invalid Expression");
    display.value = "";
  }
}
</script>

</body>
</html>
